<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>INFO1110 学习中心</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>INFO1110 学习中心</h1>

  <div class="controls">
    <button onclick="toggleTheme()">切换主题 </button>
    <button onclick="changeAccentColor()">更改主色 </button>
    <select id="fontSelect" onchange="changeFontFamily()">
      <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
      <option value="'Fira Code', monospace">Fira Code</option>
      <option value="'Source Code Pro', monospace">Source Code Pro</option>
    </select>
  </div>

  <p style="text-align:center;">欢迎来到 INFO1110，请选择以下模块：</p>

  <div class="modules">
    <div class="module">
      <strong>compiler</strong>
      <p>在线编写并运行 Python 代码。</p>
      <div class="tag">代码练习</div>
    </div>

    <div class="module">
      <strong>python 复习笔记</strong>
      <p>查看课程笔记与考点总结。</p>
      <div class="tag">学习资料</div>
    </div>

    <div class="module">
      <strong>pastpaper</strong>
      <p>练习历年试卷与样题。</p>
      <div class="tag">测试练习</div>
    </div>

    <div class="module">
      <strong>（第0个内容）</strong>
      <p>更多精彩内容敬请期待！</p>
      <div class="tag">coming soon</div>
    </div>
  </div>

  <footer>© 2026 INFO1110 TAKAHIRO</footer>

  <script>
    // 主题切换
    function toggleTheme() {
      document.body.classList.toggle('dark');
    }

    // 颜色切换
    function changeAccentColor() {
      const colors = ['#00bfa5', '#007acc', '#ff4081', '#ffa000', '#9c27b0'];
      const current = getComputedStyle(document.body).getPropertyValue('--accent-color').trim();
      const index = (colors.indexOf(current) + 1) % colors.length;
      document.body.style.setProperty('--accent-color', colors[index]);
    }

    // 字体切换
    function changeFontFamily() {
      const selected = document.getElementById("fontSelect").value;
      document.body.style.setProperty('--font-family', selected);
    }
  </script>
</body>
</html>
